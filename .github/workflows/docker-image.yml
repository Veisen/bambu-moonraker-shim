name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ./api/ -t veisen/bambu-moonraker-shim:latest
    - name: Publish image
      run: docker push veisen/bambu-moonraker-shim:latest
      
